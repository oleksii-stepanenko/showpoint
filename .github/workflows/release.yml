name: Build & Release

# Build a .dmg on every tag (v1.0.0, …) and attach it to the GitHub Release.
# You can also run it manually to get a downloadable build artifact.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Use the latest installed Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Derive version from tag
        id: ver
        run: |
          # On a tag build use the tag (v0.1.3 -> 0.1.3); otherwise fall back to
          # the value baked into project.yml so manual runs still build.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="$(awk -F'\"' '/MARKETING_VERSION:/ {print $2; exit}' project.yml)"
          fi
          echo "marketing=$VER" >> "$GITHUB_OUTPUT"
          echo "Building version $VER (build ${GITHUB_RUN_NUMBER})"

      - name: Build (Release)
        run: |
          xcodebuild -project Showpoint.xcodeproj -scheme Showpoint \
            -configuration Release -derivedDataPath build \
            MARKETING_VERSION="${{ steps.ver.outputs.marketing }}" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGNING_ALLOWED=NO build

      - name: Verify version baked into the app
        run: |
          PLIST="build/Build/Products/Release/Showpoint.app/Contents/Info.plist"
          GOT="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PLIST")"
          echo "CFBundleShortVersionString = $GOT"
          [ "$GOT" = "${{ steps.ver.outputs.marketing }}" ] || {
            echo "::error::Info.plist version $GOT != expected ${{ steps.ver.outputs.marketing }}"; exit 1; }

      - name: Code-sign
        # Two modes:
        #   • If SIGNING_CERTIFICATE_P12 / _PASSWORD secrets are set, sign with a
        #     stable self-signed identity. Its designated requirement is tied to
        #     the certificate (not the per-build cdhash), so macOS treats every
        #     update as the *same* app and the Accessibility grant survives
        #     updates — the user grants it once, ever.
        #   • Otherwise fall back to ad-hoc (--sign -). The app still runs after
        #     clearing quarantine, but its DR is the per-build cdhash, so the
        #     Accessibility permission must be re-granted after each update.
        env:
          P12: ${{ secrets.SIGNING_CERTIFICATE_P12 }}
          P12_PWD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release/Showpoint.app"

          if [ -n "${P12:-}" ]; then
            echo "Signing with the self-signed certificate (stable identity)."
            KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
            KPWD="ci-$GITHUB_RUN_ID"
            security create-keychain -p "$KPWD" "$KEYCHAIN"
            security set-keychain-settings -lut 21600 "$KEYCHAIN"
            security unlock-keychain -p "$KPWD" "$KEYCHAIN"

            echo "$P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
            security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
              -P "$P12_PWD" -T /usr/bin/codesign -T /usr/bin/security
            # Let codesign use the key without an interactive prompt.
            security set-key-partition-list -S apple-tool:,apple: -s -k "$KPWD" "$KEYCHAIN" >/dev/null
            security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

            IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F'"' '/[0-9]+\)/ {print $2; exit}')"
            echo "Using identity: $IDENTITY"
            codesign --force --deep --options runtime \
              --sign "$IDENTITY" --keychain "$KEYCHAIN" "$APP"

            # The check that matters: the designated requirement must be tied to
            # the certificate, NOT a per-build cdhash. (--verify passes for ad-hoc
            # too, so it can't tell us this.)
            codesign -d -r- "$APP"
            if codesign -d -r- "$APP" 2>&1 | grep -q 'cdhash'; then
              echo "::error::Designated requirement is cdhash-based — identity not applied; permission would still reset."
              exit 1
            fi
          else
            echo "No signing certificate secret set — falling back to ad-hoc signing."
            echo "::warning::Ad-hoc signed: users must re-grant Accessibility after each update. Add SIGNING_CERTIFICATE_P12/_PASSWORD secrets to fix."
            codesign --force --deep --sign - "$APP"
          fi

          codesign --verify --strict --verbose=2 "$APP"

      - name: Package .dmg
        run: |
          APP="build/Build/Products/Release/Showpoint.app"
          STAGE="dist/dmg"
          mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Showpoint" -srcfolder "$STAGE" \
            -ov -format UDZO dist/Showpoint.dmg

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Showpoint-dmg
          path: dist/Showpoint.dmg

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Showpoint.dmg
          generate_release_notes: true
